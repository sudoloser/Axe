name: Build Playground App

on:
  push:
    paths:
      - 'playground/**'
  pull_request:
    paths:
      - 'playground/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Playground APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd playground
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: axe-playground-debug
          path: playground/app/build/outputs/apk/debug/app-debug.apk
