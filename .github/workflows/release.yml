name: Release Build

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    branches:
      - master
    paths-ignore:
      - 'metadata/**'

jobs:
  build:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      # Added ID here so we can reference the Android SDK path later
      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          build-tools-version: '34.0.0'

      - name: Install Build Tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Optional: You can inject the version name dynamically into Gradle if needed,
      # but for now, we will just use it to label the GitHub Release.
      - name: Build Release APK & Bundle
        run: ./gradlew assembleRelease bundleRelease

      - name: Prepare Staging
        run: |
          mkdir -p staging
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} staging/ \;
          find app/build/outputs/bundle/release -name "*.aab" -exec cp {} staging/ \;
          find app/build/outputs/mapping/release -name "mapping.txt" -exec cp {} staging/ \; || true

      - name: Sign Artifacts
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.ANDROID_HOME }}
        with:
          releaseDirectory: staging
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Artifacts to Actions
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            staging/*.apk
            staging/*.aab
            staging/mapping.txt

      # Dynamic Release Step: Fallback to the commit SHA if pushed to master without an input
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "staging/*.apk,staging/*.aab"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.inputs.version_name || github.sha }}
          name: "Release ${{ github.event.inputs.version_name || github.sha }}"
          body: "Automated release containing the signed APK and App Bundle."
          draft: false
          prerelease: false
          
