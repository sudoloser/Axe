name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install Build Tools
        run: sdkmanager "build-tools;29.0.3" "build-tools;34.0.0"
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APKs
        run: ./gradlew assembleUserRelease assembleSystemRelease
        
      - name: Sign User APK
        uses: r0adkll/sign-android-release@v1
        id: sign_user
        with:
          releaseDirectory: app/build/outputs/apk/user/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}
        
      - name: Sign System APK
        uses: r0adkll/sign-android-release@v1
        id: sign_system
        with:
          releaseDirectory: app/build/outputs/apk/system/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}
          
      - name: Rename Signed APKs
        run: |
          mv ${{ steps.sign_user.outputs.signedReleaseFile }} app/build/outputs/apk/axe-release.apk
          mv ${{ steps.sign_system.outputs.signedReleaseFile }} app/build/outputs/apk/axe-system-release.apk

      - name: Extract Release Notes
        id: extract_notes
        run: |
          # Extract first section from CHANGELOG.md (everything until the second #)
          sed -n '/^# /{p;n;:a;n;/^# /q;p;ba}' CHANGELOG.md > release_notes.md
          
          # Add System Version Warning
          echo -e "\n---\n\n### ⚠️ SYSTEM VERSION WARNING\nDo **NOT** download the \`axe-system-release.apk\` unless you have read the [System Version documentation](https://github.com/${{ github.repository }}#system-version). This version is intended for rooted/custom ROM users only." >> release_notes.md

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/*.apk
          
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
        
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: app/build/outputs/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
