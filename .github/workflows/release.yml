name: Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'metadata/**'

jobs:
  build:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK & Bundle
        run: ./gradlew assembleRelease bundleRelease

      - name: Prepare Staging
        run: |
          mkdir -p staging
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} staging/ \;
          find app/build/outputs/bundle/release -name "*.aab" -exec cp {} staging/ \;
          find app/build/outputs/mapping/release -name "mapping.txt" -exec cp {} staging/ \; || true

      - name: Sign Artifacts
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: staging
          releaseKeyStore: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.kEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            staging/*.apk
            staging/*.aab
            staging/mapping.txt
